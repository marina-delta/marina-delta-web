<!DOCTYPE html>

<!-- =======================================================
     Marina Delta

     FILE : templates/base.html

     ภาษา : HTML

     หน้าที่
     -------
     โครงสร้างหลักของเว็บไซต์

     ไฟล์นี้ดูแล
     ------------
     - Sidebar
     - Header
     - Content Layout
     - โหลด CSS
     - โหลด Font

     ทุกหน้าจะสืบทอดจากไฟล์นี้
======================================================== -->

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Marina Delta</title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

    <!-- ==============================================
         SIDEBAR
    =============================================== -->

    <aside class="sidebar">

        <div class="logo">

            <h1>MARINA</h1>
            <h1>DELTA</h1>

        </div>

        <p class="tagline">

            Explore • Observe • Journal • Playground

        </p>

        <div class="description">

            ----------

        </div>

        <nav class="menu">

            <a href="/">Why Marina Delta Exist?</a>

            <a href="#">Explore</a>

            <a href="#">Explore2</a>

            <a href="#">Curiosities Notes</a>

            <a href="#">Journal</a>

            <a href="#">Dev Log</a>

        </nav>

        <div class="profile">

            <strong>Marina</strong>

            <p>

                Curious Since 1989.

            </p>

        </div>

    </aside>


    <!-- ==============================================
         MAIN
    =============================================== -->

    <main class="main">


        <!-- ==========================================
             HEADER
        =========================================== -->

        <header class="header">

            {% block header %}

            {% endblock %}

        </header>



        <!-- ==========================================
             CONTENT
        =========================================== -->

        <section class="content">

            {% block content %}

            {% endblock %}

        </section>


    </main>

</body>

</html>
